name: "Lint"

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - '.golangci.yaml'
      - '.github/workflows/golangci-lint.yaml'
  pull_request:
    paths:
      - '**.go'
      - '.golangci.yaml'
      - '.github/workflows/golangci-lint.yaml'

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: Golangci Lint
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          # Once we resolved the initial linting set of issues we should remove this
          only-new-issues: true
          # Skip cache management since actions/setup-go handles Go cache
          skip-cache: false
