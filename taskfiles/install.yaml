version: '3'

vars:
  GOLANGCI_LINT_VERSION: 2.6.1
  TPARSE_VERSION: 0.18.0
  GOVULNCHECK_VERSION: 1.1.4
  OSV_SCANNER_VERSION: 2.3.0
  ADDLICENSE_VERSION: 1.2.0

tasks:
  go:
    desc: Install Go locally
    run: once
    vars:
      GOLANG_URL_DEFAULT: https://go.dev/dl/go{{.GO_VERSION}}.{{OS}}-{{ARCH}}.tar.gz
      GOLANG_URL: '{{default .GOLANG_URL_DEFAULT .GOLANG_URL}}'
    cmds:
      - rm -rf {{.GO_ROOT}}
      - mkdir -p {{.GO_ROOT}}
      - curl -sSLf --retry 3 --retry-connrefused --retry-delay 2 '{{.GOLANG_URL}}' | tar -xz -C {{.GO_ROOT}} --strip 1
    status:
      - test -f {{.GO_BIN}}
      - '[[ $(GOTOOLCHAIN=local {{.GO_BIN}} version) == *"go{{.GO_VERSION}}"* ]]'

  golangci-lint:
    desc: Install golangci-lint (built from source with local Go)
    deps:
      - go
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - GOBIN={{.BIN_DIR}} {{.GO_BIN}} install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v{{.GOLANGCI_LINT_VERSION}}
    status:
      - test -f {{.BIN_DIR}}/golangci-lint
      - '[[ $({{.BIN_DIR}}/golangci-lint --version) == *"{{.GOLANGCI_LINT_VERSION}}"* ]]'
      - '[[ $({{.GO_BIN}} version {{.BIN_DIR}}/golangci-lint) == *"go{{.GO_VERSION}}"* ]]'

  tparse:
    desc: Install tparse
    deps:
      - go
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - GOBIN={{.BIN_DIR}} {{.GO_BIN}} install github.com/mfridman/tparse@v{{.TPARSE_VERSION}}
    status:
      - test -f {{.BIN_DIR}}/tparse
      - '[[ $({{.BIN_DIR}}/tparse --version 2>&1) == *"{{.TPARSE_VERSION}}"* ]]'
      - '[[ $({{.GO_BIN}} version {{.BIN_DIR}}/tparse) == *"go{{.GO_VERSION}}"* ]]'

  govulncheck:
    desc: Install govulncheck (Go vulnerability scanner)
    deps:
      - go
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - GOBIN={{.BIN_DIR}} {{.GO_BIN}} install golang.org/x/vuln/cmd/govulncheck@v{{.GOVULNCHECK_VERSION}}
    status:
      - test -f {{.BIN_DIR}}/govulncheck
      - '[[ $({{.BIN_DIR}}/govulncheck -version 2>&1) == *"v{{.GOVULNCHECK_VERSION}}"* ]]'
      - '[[ $({{.GO_BIN}} version {{.BIN_DIR}}/govulncheck) == *"go{{.GO_VERSION}}"* ]]'

  osv-scanner:
    desc: Install osv-scanner (Google OSV vulnerability scanner)
    deps:
      - go
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - GOBIN={{.BIN_DIR}} {{.GO_BIN}} install github.com/google/osv-scanner/v2/cmd/osv-scanner@v{{.OSV_SCANNER_VERSION}}
    status:
      - test -f {{.BIN_DIR}}/osv-scanner
      - '[[ $({{.BIN_DIR}}/osv-scanner --version 2>&1) == *"{{.OSV_SCANNER_VERSION}}"* ]]'
      - '[[ $({{.GO_BIN}} version {{.BIN_DIR}}/osv-scanner) == *"go{{.GO_VERSION}}"* ]]'

  addlicense:
    desc: Install addlicense (Apache license header tool)
    deps:
      - go
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - GOBIN={{.BIN_DIR}} {{.GO_BIN}} install github.com/google/addlicense@v{{.ADDLICENSE_VERSION}}
    status:
      - test -f {{.BIN_DIR}}/addlicense
      - '[[ $({{.GO_BIN}} version {{.BIN_DIR}}/addlicense) == *"go{{.GO_VERSION}}"* ]]'
