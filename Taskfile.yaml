version: '3'

dotenv: ['.env.local', '.env']

vars:
  BUILD_ROOT: "{{.ROOT_DIR}}/.build"
  BIN_DIR: "{{.BUILD_ROOT}}/.bin"
  GO_VERSION: 1.26.1
  GO_ROOT: "{{.BUILD_ROOT}}/go{{.GO_VERSION}}"
  GO_BIN: "{{.GO_ROOT}}/bin/go"
  MODULE_PATH: github.com/redpanda-data/ai-sdk-go

env:
  GOROOT: "{{.GO_ROOT}}"
  GOTOOLCHAIN: local

includes:
  install: taskfiles/install.yaml

tasks:
  license:
    desc: Add Apache 2.0 license headers to all Go files
    deps:
      - install:addlicense
    cmds:
      - '{{.BIN_DIR}}/addlicense -f header.txt -ignore ".build/**" .'

  license:check:
    desc: Check that all Go files have Apache 2.0 license headers
    deps:
      - install:addlicense
    cmds:
      - '{{.BIN_DIR}}/addlicense -f header.txt -ignore ".build/**" -check .'

  lint:
    desc: Run golangci-lint on all directories with Go files (excluding build/)
    deps:
      - install:golangci-lint
    cmds:
      - 'PATH={{.GO_ROOT}}/bin:$PATH {{.BIN_DIR}}/golangci-lint run --fix --timeout 10m ./...'

  test:
    desc: Run all tests with coverage
    deps:
      - install:go
      - install:tparse
    cmds:
      - '{{.GO_BIN}} test -json -cover -parallel 10 -timeout 30m ./... | {{.BIN_DIR}}/tparse -follow -all'

  test:unit:
    desc: Run unit tests only with coverage (excludes integration tests)
    deps:
      - install:go
      - install:tparse
    cmds:
      - '{{.GO_BIN}} test -json -cover -short -parallel 10 ./... | {{.BIN_DIR}}/tparse -follow -all'

  test:integration:
    desc: Run integration tests with coverage (requires OPENAI_API_KEY)
    deps:
      - install:go
      - install:tparse
    cmds:
      - '{{.GO_BIN}} test -json -cover -parallel 10 -timeout 30m -run Integration ./... | {{.BIN_DIR}}/tparse -follow -all'

  security:
    desc: Run security vulnerability checks (govulncheck + osv-scanner)
    deps:
      - install:go
      - install:govulncheck
      - install:osv-scanner
    cmds:
      - '{{.BIN_DIR}}/govulncheck ./...'
      - '{{.BIN_DIR}}/osv-scanner --lockfile go.mod'

  ci:
    desc: Run all CI checks (license, lint, test:unit)
    cmds:
      - task: license:check
      - task: lint
      - task: test:unit
